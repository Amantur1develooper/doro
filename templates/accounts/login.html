{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Dorolien</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <span class="big-icon">💊</span>
      <h1>Dorolien</h1>
      <p>Корпоративная платформа управления</p>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-error">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Логин</label>
        <input type="text" name="username" placeholder="Введите логин" required autofocus>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="Введите пароль" required>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content: center; padding: 12px;">
        Войти в систему
      </button>
    </form>

    <p style="text-align:center; color: var(--text2); font-size: 12px; margin-top: 20px;">
      Dorolien CRM • Управление медицинскими продажами
    </p>
  </div>
</div>
</body>
</html>
