{% extends 'base/base.html' %}
{% block title %}Добавить препарат{% endblock %}
{% block page_title %}Добавить препарат{% endblock %}
{% block topbar_actions %}<a href="{% url 'products_list' %}" class="btn btn-secondary btn-sm">← Назад</a>{% endblock %}
{% block content %}
<div style="max-width:700px;">
  <div class="card">
    <h2 style="font-size:16px;font-weight:700;margin-bottom:24px;">💊 Новый препарат</h2>
    <form method="post">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group">
          <label>Наименование *</label>
          <input type="text" name="name" required value="{{ post.name|default:'' }}">
        </div>
        <div class="form-group">
          <label>Международное название</label>
          <input type="text" name="international_name" value="{{ post.international_name|default:'' }}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Артикул/SKU *</label>
          <input type="text" name="sku" required value="{{ post.sku|default:'' }}">
        </div>
        <div class="form-group">
          <label>Категория</label>
          <select name="category">
            <option value="">— Выберите —</option>
            {% for c in categories %}
            <option value="{{ c.pk }}" {% if post.category == c.pk|stringformat:"s" %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Форма выпуска</label>
          <input type="text" name="form" placeholder="Таблетки, капсулы..." value="{{ post.form|default:'' }}">
        </div>
        <div class="form-group">
          <label>Дозировка</label>
          <input type="text" name="dosage" placeholder="10 мг, 500 мг..." value="{{ post.dosage|default:'' }}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Производитель</label>
          <input type="text" name="manufacturer" value="{{ post.manufacturer|default:'' }}">
        </div>
        <div class="form-group">
          <label>Единица измерения</label>
          <input type="text" name="unit" value="{{ post.unit|default:'шт' }}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Закупочная цена</label>
          <input type="number" name="purchase_price" step="0.01" value="{{ post.purchase_price|default:'0' }}">
        </div>
        <div class="form-group">
          <label>Себестоимость</label>
          <input type="number" name="cost_price" step="0.01" value="{{ post.cost_price|default:'0' }}">
        </div>
        <div class="form-group">
          <label>Отпускная цена</label>
          <input type="number" name="sale_price" step="0.01" value="{{ post.sale_price|default:'0' }}">
        </div>
      </div>
      <div class="form-group">
        <label>Примечания</label>
        <textarea name="notes">{{ post.notes|default:'' }}</textarea>
      </div>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">💾 Сохранить</button>
        <a href="{% url 'products_list' %}" class="btn btn-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
